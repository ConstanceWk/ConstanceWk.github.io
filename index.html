<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constance W. | Data Scientist</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
    <link href="assets/css/components.css" rel="stylesheet">
    <link href="assets/css/animations.css" rel="stylesheet">
</head>
<body>
    <!-- Fond animé avec des bulles -->
    <div class="animated-background">
        <div class="gradient-bg"></div>
        <div class="moving-bubbles">
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar glass">
        <div class="nav-brand">CW</div>
        <div class="nav-links">
            <a href="index.html" class="active">Accueil</a>
            <a href="pages/projects.html">Projets</a>
            <a href="pages/about.html">À propos</a>
            <a href="pages/contact.html">Contact</a>
        </div>
        <button class="nav-toggle">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <!-- Hero Section -->
    <main class="hero">
        <div class="container">
            <div class="hero-content">
                <!-- Image de profil avec effet de vague -->
                <div class="profile-wrapper">
                    <div class="profile-blob">
                        <img src="assets/img/photo_profil.png" alt="Constance W." class="profile-image">
                    </div>
                    <div class="blob-animation"></div>
                </div>

                <!-- Contenu textuel -->
                <div class="content-wrapper">
                    <h1>Constance W.</h1>
                    <h2 class="gradient-text">Data Scientist</h2>
                    <p class="hero-description">
                        Passionnée par l'analyse de données et le machine learning,
                        je transforme des données complexes en solutions concrètes.
                    </p>

                    <div class="cta-group">
                        <a href="#" class="cta-button primary glass">
                            <i class="fas fa-download"></i>
                            Télécharger CV
                        </a>
                        <a href="pages/projects.html" class="cta-button secondary glass">
                            <i class="fas fa-project-diagram"></i>
                            Voir mes projets
                        </a>
                    </div>

                    <div class="stats-wrapper">
                        <div class="stat-item glass">
                            <span class="stat-number">3+</span>
                            <span class="stat-label">Années d'expérience</span>
                        </div>
                        <div class="stat-item glass">
                            <span class="stat-number">15+</span>
                            <span class="stat-label">Projets complétés</span>
                        </div>
                        <div class="stat-item glass">
                            <span class="stat-number">5+</span>
                            <span class="stat-label">Publications</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/animations.js"></script>
</body>
</html>
