<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constance W. | Data Scientist</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
    <link href="assets/css/components.css" rel="stylesheet">
    <link href="assets/css/animations.css" rel="stylesheet">
</head>
<body>
    <!-- Bulles d'arrière-plan -->
    <div class="bubbles-container">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">CW</div>
        <div class="nav-links">
            <a href="#home" class="active">Accueil</a>
            <a href="#competences">Compétences</a>
            <a href="#projects">Projets</a>
            <a href="#about">À propos</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="container">
            <div class="hero-content">
                <div class="profile-container">
                    <div class="profile-sphere">
                        <img src="assets/img/photo_profil.png" alt="Constance W." class="profile-img">
                        <div class="orbit">
                            <div class="skill-orbit-item" style="--i:0">
                                <i class="fab fa-python"></i>
                            </div>
                            <div class="skill-orbit-item" style="--i:1">
                                <i class="fas fa-database"></i>
                            </div>
                            <div class="skill-orbit-item" style="--i:2">
                                <i class="fas fa-brain"></i>
                            </div>
                            <div class="skill-orbit-item" style="--i:3">
                                <i class="fas fa-chart-network"></i>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="hero-text">
                    <h1 class="glitch-text">Data Scientist</h1>
                    <h2 class="gradient-text">Transforming Data into Insights</h2>
                    <p class="hero-description">Spécialisée en analyse de données et machine learning</p>
                    
                    <div class="cta-container">
                        <a href="#projects" class="cta-button primary">
                            <span>Voir mes projets</span>
                            <i class="fas fa-arrow-right"></i>
                        </a>
                        <a href="#contact" class="cta-button secondary">
                            <span>Me contacter</span>
                            <i class="fas fa-paper-plane"></i>
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="floating-tech">
                <div class="tech-bubble" style="--delay:0s">Python</div>
                <div class="tech-bubble" style="--delay:1s">ML</div>
                <div class="tech-bubble" style="--delay:2s">SQL</div>
                <div class="tech-bubble" style="--delay:3s">Data</div>
            </div>
        </div>
    </section>
</body>
</html>
