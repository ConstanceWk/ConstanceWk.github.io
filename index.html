<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constance W. | Data Scientist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="assets/css/main.css" rel="stylesheet">
    <link href="assets/css/components.css" rel="stylesheet">
    <link href="assets/css/animations.css" rel="stylesheet">
</head>
<body>
    <!-- Arrière-plan animé -->
    <div class="animated-background">
        <div class="gradient-overlay"></div>
        <div class="moving-bubbles">
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">CW</div>
        <div class="nav-links">
            <a href="#" class="active">Accueil</a>
            <a href="pages/competences.html">Compétences</a>
            <a href="pages/projects.html">Projets</a>
            <a href="pages/about.html">À propos</a>
            <a href="pages/contact.html">Contact</a>
        </div>
        <button class="nav-toggle">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <!-- Hero Section -->
    <main class="hero">
        <div class="container">
            <div class="hero-content">
                <!-- Conteneur de profil -->
                <div class="profile-container">
                    <div class="profile-glow"></div>
                    <div class="profile-orbits">
                        <div class="orbit-dot"></div>
                        <div class="orbit-dot"></div>
                        <div class="orbit-dot"></div>
                        <div class="orbit-dot"></div>
                    </div>
                    <div class="profile-wrapper">
                        <img src="assets/img/photo_profil.png" alt="Constance W." class="profile-image">
                    </div>
                </div>

                <!-- Contenu principal -->
                <div class="content-section">
                    <h1 class="main-title">Constance W.</h1>
                    <h2 class="gradient-subtitle">Data Scientist</h2>
                    <p class="hero-description">
                        Passionnée par l'analyse de données et le machine learning, 
                        je transforme des données complexes en solutions concrètes.
                    </p>
                    
                    <!-- Boutons CTA -->
                    <div class="cta-buttons">
                        <a href="#" class="cta-button primary">
                            <i class="fas fa-download"></i>
                            Télécharger CV
                        </a>
                        <a href="pages/projects.html" class="cta-button secondary">
                            <i class="fas fa-arrow-right"></i>
                            Voir mes projets
                        </a>
                    </div>

                    <!-- Stats -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-number">3+</span>
                            <span class="stat-label">Années d'expérience</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number">15+</span>
                            <span class="stat-label">Projets complétés</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number">5+</span>
                            <span class="stat-label">Publications</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/animations.js"></script>
</body>
</html>
