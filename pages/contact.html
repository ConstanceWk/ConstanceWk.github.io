<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Constance W.</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../assets/css/main.css" rel="stylesheet">
    <link href="../assets/css/components.css" rel="stylesheet">
    <link href="../assets/css/animations.css" rel="stylesheet">
</head>
<body>
    <!-- Bulles d'arrière-plan -->
    <div class="bubble-background">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">CW</div>
        <div class="nav-links">
            <a href="../index.html">Accueil</a>
            <a href="projects.html">Projets</a>
            <a href="about.html">À propos</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <!-- Contact Section -->
    <main class="contact-container">
        <div class="page-header">
            <h1 class="contact-title">Me Contacter</h1>
            <p class="contact-subtitle">N'hésitez pas à me contacter pour toute opportunité ou question</p>
        </div>

        <div class="contact-grid">
            <!-- Contact Info Cards -->
            <div class="contact-info">
                <div class="contact-card">
                    <div class="card-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <h3>Email</h3>
                    <a href="mailto:contact@example.com">contact@example.com</a>
                </div>
                
                <div class="contact-card">
                    <div class="card-icon">
                        <i class="fab fa-linkedin"></i>
                    </div>
                    <h3>LinkedIn</h3>
                    <a href="#" target="_blank">linkedin.com/in/constancew</a>
                </div>

                <div class="contact-card">
                    <div class="card-icon">
                        <i class="fab fa-github"></i>
                    </div>
                    <h3>GitHub</h3>
                    <a href="#" target="_blank">github.com/constancew</a>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="contact-form-wrapper">
                <form id="contact-form" class="contact-form">
                    <div class="form-group">
                        <input type="text" id="name" name="name" required>
                        <label for="name">Votre nom</label>
                    </div>

                    <div class="form-group">
                        <input type="email" id="email" name="email" required>
                        <label for="email">Votre email</label>
                    </div>

                    <div class="form-group">
                        <input type="text" id="subject" name="subject" required>
                        <label for="subject">Sujet</label>
                    </div>

                    <div class="form-group">
                        <textarea id="message" name="message" required></textarea>
                        <label for="message">Votre message</label>
                    </div>

                    <button type="submit" class="submit-button">
                        <span>Envoyer</span>
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="../assets/js/main.js"></script>
</body>
</html>
