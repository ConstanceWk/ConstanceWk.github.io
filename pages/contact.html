<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Data Science Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../assets/css/main.css" rel="stylesheet">
    <link href="../assets/css/components.css" rel="stylesheet">
    <link href="../assets/css/animations.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">CW</div>
        <div class="nav-links">
            <a href="../index.html">Accueil</a>
            <a href="projects.html">Projets</a>
            <a href="about.html">À propos</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <h1 class="animate-on-scroll">Me <span class="gradient-text">Contacter</span></h1>
            <div class="contact-content">
                <!-- Contact Info Cards -->
                <div class="contact-info">
                    <div class="contact-card animate-on-scroll" data-tilt>
                        <i class="fas fa-envelope"></i>
                        <h3>Email</h3>
                        <a href="mailto:contact@example.com">contact@example.com</a>
                    </div>
                    <div class="contact-card animate-on-scroll" data-tilt>
                        <i class="fab fa-linkedin"></i>
                        <h3>LinkedIn</h3>
                        <a href="#" target="_blank">linkedin.com/in/votre-profil</a>
                    </div>
                    <div class="contact-card animate-on-scroll" data-tilt>
                        <i class="fab fa-github"></i>
                        <h3>GitHub</h3>
                        <a href="#" target="_blank">github.com/votre-profil</a>
                    </div>
                </div>

                <!-- Contact Form -->
                <div class="contact-form-wrapper animate-on-scroll">
                    <form id="contact-form" class="glass-morphism">
                        <div class="form-group floating">
                            <input type="text" id="name" required>
                            <label for="name">Votre nom</label>
                        </div>
                        <div class="form-group floating">
                            <input type="email" id="email" required>
                            <label for="email">Votre email</label>
                        </div>
                        <div class="form-group floating">
                            <textarea id="message" required></textarea>
                            <label for="message">Votre message</label>
                        </div>
                        <button type="submit" class="submit-button">
                            <span>Envoyer</span>
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <script src="../assets/js/main.js"></script>
</body>
</html>
