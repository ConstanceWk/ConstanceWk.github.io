<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Data Science Portfolio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../assets/css/main.css" rel="stylesheet">
    <link href="../assets/css/components.css" rel="stylesheet">
    <link href="../assets/css/animations.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">CW</div>
        <div class="nav-links">
            <a href="../index.html">Accueil</a>
            <a href="projects.html">Projets</a>
            <a href="about.html">À propos</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <div class="contact-content fade-in">
                <h1>Me Contacter</h1>
                <p class="lead">N'hésitez pas à me contacter pour discuter de projets ou d'opportunités de collaboration.</p>

                <div class="contact-grid">
                    <!-- Contact Info -->
                    <div class="contact-info animate-on-scroll">
                        <div class="contact-item">
                            <i class="fas fa-envelope"></i>
                            <div class="contact-details">
                                <h3>Email</h3>
                                <a href="mailto:contact@example.com">contact@example.com</a>
                            </div>
                        </div>

                        <div class="contact-item">
                            <i class="fab fa-linkedin"></i>
                            <div class="contact-details">
                                <h3>LinkedIn</h3>
                                <a href="#" target="_blank">linkedin.com/in/votre-profil</a>
                            </div>
                        </div>

                        <div class="contact-item">
                            <i class="fab fa-github"></i>
                            <div class="contact-details">
                                <h3>GitHub</h3>
                                <a href="#" target="_blank">github.com/votre-profil</a>
                            </div>
                        </div>
                    </div>

                    <!-- Contact Form -->
                    <div class="contact-form animate-on-scroll">
                        <form id="contactForm">
                            <div class="form-group">
                                <label for="name">Nom</label>
                                <input type="text" id="name" name="name" required>
                            </div>

                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" required>
                            </div>

                            <div class="form-group">
                                <label for="subject">Sujet</label>
                                <input type="text" id="subject" name="subject" required>
                            </div>

                            <div class="form-group">
                                <label for="message">Message</label>
                                <textarea id="message" name="message" rows="5" required></textarea>
                            </div>

                            <button type="submit" class="cta-button">Envoyer le message</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/contact.js"></script>
</body>
</html>
