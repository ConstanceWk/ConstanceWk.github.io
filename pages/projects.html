<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets | Data Science Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../assets/css/main.css" rel="stylesheet">
    <link href="../assets/css/components.css" rel="stylesheet">
    <link href="../assets/css/animations.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">CW</div>
        <div class="nav-links">
            <a href="../index.html">Accueil</a>
            <a href="projects.html" class="active">Projets</a>
            <a href="about.html">À propos</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <!-- Projects Header -->
    <header class="projects-header">
        <div class="container">
            <h1 class="animate-on-scroll">Projets <span class="gradient-text">Data Science</span></h1>
            <p class="lead">Découvrez mes réalisations en analyse de données et machine learning</p>
        </div>
    </header>

    <!-- Projects Section -->
    <section class="projects-section">
        <div class="container">
            <!-- Project Filters -->
            <div class="project-filters animate-on-scroll">
                <button class="filter-tag active" data-filter="all">Tous</button>
                <button class="filter-tag" data-filter="machine-learning">Machine Learning</button>
                <button class="filter-tag" data-filter="nlp">NLP</button>
                <button class="filter-tag" data-filter="clustering">Clustering</button>
            </div>

            <!-- Projects Search -->
            <div class="projects-search animate-on-scroll">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" id="project-search" placeholder="Rechercher un projet...">
                </div>
            </div>

            <!-- Projects Grid -->
            <div class="projects-grid">
                <!-- Projects will be dynamically inserted here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/projects.js"></script>
</body>
</html>
